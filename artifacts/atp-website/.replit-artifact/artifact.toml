kind = "web"
previewPath = "/"
title = "Aditya Technology Partners"
version = "1.0.0"
id = "artifacts/atp-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23335

[services.development]
run = "pnpm --filter @workspace/atp-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/atp-website", "run", "build" ]
publicDir = "artifacts/atp-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23335"
BASE_PATH = "/"
